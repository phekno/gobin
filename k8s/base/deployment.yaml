apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobin
  namespace: gobin
  labels:
    app.kubernetes.io/name: gobin
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1  # Usenet downloader is stateful — single replica
  strategy:
    type: Recreate  # Not RollingUpdate — only one instance should own downloads
  selector:
    matchLabels:
      app.kubernetes.io/name: gobin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gobin
        app.kubernetes.io/component: server
      annotations:
        # Trigger redeployment when config changes
        checksum/config: "{{ include (print .Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
        # Prometheus scrape annotations
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gobin
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: gobin
          image: ghcr.io/phekno/gobin:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/config/config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - secretRef:
                name: gobin-secrets
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: downloads
              mountPath: /downloads
            - name: tmp
              mountPath: /tmp/gobin
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
          lifecycle:
            preStop:
              exec:
                # Give in-flight segments time to finish
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: config
          configMap:
            name: gobin-config
        - name: downloads
          persistentVolumeClaim:
            claimName: gobin-downloads
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gobin
  namespace: gobin
  labels:
    app.kubernetes.io/name: gobin
