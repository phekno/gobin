apiVersion: v1
kind: Secret
metadata:
  name: gobin-secrets
  namespace: gobin
  labels:
    app.kubernetes.io/name: gobin
    app.kubernetes.io/component: config
type: Opaque
# In production, use sealed-secrets, external-secrets-operator, or vault.
# These are base64-encoded placeholders.
stringData:
  USENET_HOST: "news.example.com"
  USENET_USER: "your-username"
  USENET_PASS: "your-password"
  GOBIN_API_KEY: "change-me-to-something-random"
