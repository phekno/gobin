name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Run full test suite before releasing
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go test ./... -v -race -count=1

  # ──────────────────────────────────────────────
  # Build frontend
  # ──────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - working-directory: web
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Build multi-arch Docker image and push to GHCR
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      # Extract version from tag (v0.1.0 → 0.1.0)
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Create GitHub Release with binaries
  # ──────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      # Build release binaries for multiple platforms
      - name: Build release binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}"

          for PAIR in linux/amd64 linux/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            OUTPUT="gobin-${OS}-${ARCH}"
            echo "Building ${OUTPUT}..."
            CGO_ENABLED=0 GOOS="${OS}" GOARCH="${ARCH}" \
              go build -ldflags="${LDFLAGS}" -o "${OUTPUT}" ./cmd/gobin
          done

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Docker
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            gobin-linux-amd64
            gobin-linux-arm64
          generate_release_notes: true

  # ──────────────────────────────────────────────
  # Notify Flux to reconcile (optional)
  # ──────────────────────────────────────────────
  notify-flux:
    name: Notify Flux
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push'
    steps:
      # Option: Use Flux image automation to detect new tags automatically.
      # Or trigger a dispatch to your gitops repo to bump the tag.
      - name: Update GitOps repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: phekno/home-ops  # Your flux gitops repo
          event-type: update-gobin
          client-payload: '{"tag": "${{ github.ref_name }}", "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"}'
